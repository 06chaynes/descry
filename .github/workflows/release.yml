name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

# Default to least-privilege. Only the publish jobs opt into id-token: write
# for OIDC trusted publishing.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG_VERSION="${GIT_TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GIT_TAG does not match pyproject version $PKG_VERSION"
            exit 1
          fi
      - name: Build sdist + wheel
        run: uv build
      - name: Check distributions with twine
        run: |
          uv pip install --system twine
          twine check --strict dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  audit:
    name: Security audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install descry[all] + pip-audit
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[all]" pip-audit
      - name: Audit resolved environment
        run: |
          . .venv/bin/activate
          pip-audit --skip-editable

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, audit]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/descry-codegraph
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI via OIDC
        # NOTE: this is a Docker container action — its GHCR image is only
        # tagged with release refs, never commit SHAs. Pinning to a commit
        # SHA here fails with "manifest unknown" because no image at that
        # digest exists. Pinning to the version tag is the documented
        # approach; PyPA controls this tag and tag mutation would be a
        # notable event we'd catch via the trusted-publisher audit log.
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [build, audit]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/descry-codegraph
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI via OIDC
        # NOTE: this is a Docker container action — its GHCR image is only
        # tagged with release refs, never commit SHAs. Pinning to a commit
        # SHA here fails with "manifest unknown" because no image at that
        # digest exists. Pinning to the version tag is the documented
        # approach; PyPA controls this tag and tag mutation would be a
        # notable event we'd catch via the trusted-publisher audit log.
        uses: pypa/gh-action-pypi-publish@v1.14.0
