name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

# Default to least-privilege. Only the publish jobs opt into id-token: write
# for OIDC trusted publishing.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG_VERSION="${GIT_TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GIT_TAG does not match pyproject version $PKG_VERSION"
            exit 1
          fi
      - name: Build sdist + wheel
        run: uv build
      - name: Check distributions with twine
        run: |
          uv pip install --system twine
          twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  audit:
    name: Security audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install descry[all] + pip-audit
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[all]" pip-audit
      - name: Audit resolved environment
        run: |
          . .venv/bin/activate
          # CVE-2026-3219 (GHSA-58qw-9mgm-455v): concatenated tar/ZIP
          # interpretation conflict in pip itself. Affects pip <= 26.0.1
          # with no patched version upstream. pip is a build-time
          # installer in the venv, not a runtime dep we ship.
          # Re-evaluate when pip ships a fix.
          pip-audit --skip-editable --ignore-vuln CVE-2026-3219

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, audit]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/descry-codegraph
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI via OIDC
        # NOTE: this is a Docker container action — its GHCR image is only
        # tagged with release refs, never commit SHAs. Pinning to a commit
        # SHA here fails with "manifest unknown" because no image at that
        # digest exists. Pinning to the version tag is the documented
        # approach; PyPA controls this tag and tag mutation would be a
        # notable event we'd catch via the trusted-publisher audit log.
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [build, audit]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/descry-codegraph
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI via OIDC
        # NOTE: this is a Docker container action — its GHCR image is only
        # tagged with release refs, never commit SHAs. Pinning to a commit
        # SHA here fails with "manifest unknown" because no image at that
        # digest exists. Pinning to the version tag is the documented
        # approach; PyPA controls this tag and tag mutation would be a
        # notable event we'd catch via the trusted-publisher audit log.
        uses: pypa/gh-action-pypi-publish@v1.14.0
